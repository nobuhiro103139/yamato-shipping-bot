name: Daily Shipping

on:
  schedule:
    - cron: '0 1 * * *'  # 毎日 10:00 JST
  workflow_dispatch:

concurrency:
  group: daily-shipping
  cancel-in-progress: false

jobs:
  ship:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi --no-root

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run shipping automation
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" \
            python -m scripts.ship
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KURONEKO_LOGIN_ID: ${{ secrets.KURONEKO_LOGIN_ID }}
          KURONEKO_PASSWORD: ${{ secrets.KURONEKO_PASSWORD }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
          SENDER_POSTAL_CODE: ${{ secrets.SENDER_POSTAL_CODE }}
          SENDER_ADDRESS1: ${{ secrets.SENDER_ADDRESS1 }}
          SENDER_ADDRESS2: ${{ secrets.SENDER_ADDRESS2 }}
          SENDER_PHONE: ${{ secrets.SENDER_PHONE }}
          DEFAULT_PACKAGE_SIZE: ${{ secrets.DEFAULT_PACKAGE_SIZE }}
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
