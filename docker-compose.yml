services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - HEADLESS_BROWSER=true
      - AUTH_STATE_PATH=/app/data/auth.json
      - OP_SERVICE_ACCOUNT_TOKEN=${OP_SERVICE_ACCOUNT_TOKEN:-}
    volumes:
      - yamato-data:/app/data
      - yamato-qrcodes:/app/qr_codes
    restart: unless-stopped

  runner:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.cli"]
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - HEADLESS_BROWSER=true
      - AUTH_STATE_PATH=/app/data/auth.json
      - OP_SERVICE_ACCOUNT_TOKEN=${OP_SERVICE_ACCOUNT_TOKEN:-}
    volumes:
      - yamato-data:/app/data
      - yamato-qrcodes:/app/qr_codes
    profiles:
      - cli

volumes:
  yamato-data:
  yamato-qrcodes:
