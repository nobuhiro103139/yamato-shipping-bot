services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - HEADLESS_BROWSER=true
      - AUTH_STATE_PATH=/app/data/auth.json
    volumes:
      - yamato-data:/app/data
      - yamato-results:/app/results
    restart: unless-stopped

  runner:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["python", "-m", "app.cli"]
    env_file:
      - ./backend/.env
    environment:
      - HEADLESS_BROWSER=true
      - AUTH_STATE_PATH=/app/data/auth.json
    volumes:
      - yamato-data:/app/data
      - yamato-results:/app/results
      - ./backend/shipments.json:/app/shipments.json:ro
    profiles:
      - cli

volumes:
  yamato-data:
  yamato-results:
